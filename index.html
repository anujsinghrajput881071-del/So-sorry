<!DOCTYPE html>
<html>
<head>
<title>I'm Sorry Mehek</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  padding: 0;
  background: linear-gradient(to right, #ff9a9e, #fecfef);
  font-family: 'Poppins', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  background: white;
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 0 20px rgba(0,0,0,0.2);
  text-align: center;
  width: 90%;
  max-width: 400px;
}

h1 {
  color: #ff4d6d;
}

p {
  font-size: 16px;
  color: #333;
  line-height: 1.7;
}

button {
  margin-top: 15px;
  padding: 10px 20px;
  font-size: 16px;
  background: #ff4d6d;
  color: white;
  border: none;
  border-radius: 20px;
  cursor: pointer;
}

button:hover {
  background: #e60039;
}
</style>

</head>

<body>

<div class="box">
  <h1>I'm Really Sorry Mehek</h1>
  <p id="msg">Please ek baar click karo... 🙏</p>
  <button onclick="showMessage()">Click Here</button>
</div>

<script>
function showMessage() {
  document.getElementById("msg").innerHTML =
  "Sorry Sorry Sorry 😔 agar meri vajah se hurt hua ho to...<br>" +
  "Lekin kam se kam reply to kar do 🙏 agar kuch bura laga ho to bata do, main wo dobara nahi karunga 💛<br><br>" +

  "Lekin friends to ban sakte hai na 🙂<br><br>" +

  "I promise hurt nahi karunga, trust nahi todunga 🤝<br>" +
  "Jhooth nahi bolunga 🙏<br><br>" +

  "Hamesha na sahi lekin jitna hoga main koshish karunga tumhe hasa saku 😊<br>" +
  "Sorry 😞";
}
</script>

</body>
</html>
